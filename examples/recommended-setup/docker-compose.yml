volumes:
  minio:
  rabbitmq:
  redis:
# Opt-in OpenTelemetry collector config. Only used by the `otel-collector`
# service, which runs under the `observability` profile (see below).
configs:
  otel-collector-config:
    content: |
      receivers:
        otlp:
          protocols:
            http:
              endpoint: 0.0.0.0:4318
            grpc:
              endpoint: 0.0.0.0:4317
      exporters:
        debug:
          verbosity: detailed
      service:
        pipelines:
          logs:
            receivers: [otlp]
            exporters: [debug]
          traces:
            receivers: [otlp]
            exporters: [debug]
          metrics:
            receivers: [otlp]
            exporters: [debug]
services:
  # Opt-in OpenTelemetry collector. Start it (and enable OTEL_* on the services
  # below) with: docker compose --profile observability up
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    profiles: ['observability']
    restart: unless-stopped
    command: ['--config=/etc/otel-collector.yaml']
    configs:
      - source: otel-collector-config
        target: /etc/otel-collector.yaml
    ports:
      - '4318:4318'
      - '4317:4317'
  rabbitmq:
    image: rabbitmq:3.13.0-management-alpine
    ports:
      - '5672:5672'
      - '15672:15672'
    environment:
      RABBITMQ_DEFAULT_USER: 'test'
      RABBITMQ_DEFAULT_PASS: 'test'
    volumes:
      - 'rabbitmq:/var/lib/rabbitmq'
    healthcheck:
      test: rabbitmq-diagnostics check_port_connectivity
      # Adjust the health checks to better fit your needs
      start_period: 60s
      interval: 5s
      timeout: 1s
      retries: 3
  minio:
    image: minio/minio:RELEASE.2024-07-04T14-25-45Z
    command: server /data --console-address ":9001"
    expose:
      - '9000'
    ports:
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 1s
      retries: 3
    volumes:
      - 'minio:/data'
  mc:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      mc alias set minio http://minio:9000 minioadmin minioadmin && \
      mc mb minio/tf2-automatic --ignore-existing && \
      mc anonymous set public minio/tf2-automatic
      "
  redis:
    image: redis:7.2.4-alpine
    command: redis-server --requirepass test --appendonly yes --maxmemory-policy noeviction
    expose:
      - '6379'
    volumes:
      - redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 1s
      retries: 3
  item-service:
    image: ghcr.io/tf2-automatic/item-service:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      bot-manager:
        condition: service_healthy
      mc:
        condition: service_completed_successfully
    expose:
      - '3000'
    ports:
      - '3003:3000'
    environment:
      REDIS_HOST: 'redis'
      REDIS_PORT: 6379
      REDIS_PASSWORD: 'test'
      RABBITMQ_HOST: 'rabbitmq'
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: 'test'
      RABBITMQ_PASSWORD: 'test'
      RABBITMQ_VHOST: ''
      STORAGE_TYPE: 's3'
      STORAGE_S3_ENDPOINT: 'minio'
      STORAGE_S3_PORT: 9000
      STORAGE_S3_USE_SSL: false
      STORAGE_S3_PATH: '/'
      STORAGE_S3_BUCKET: 'tf2-automatic'
      STORAGE_S3_ACCESS_KEY_ID: 'minioadmin'
      STORAGE_S3_SECRET_ACCESS_KEY: 'minioadmin'
      BOT_MANAGER_URL: 'http://bot-manager:3000'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-S', 'http://localhost:3000/health']
      interval: 5s
      timeout: 1s
      retries: 3
  bot-manager:
    image: ghcr.io/tf2-automatic/bot-manager:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - '3000'
    ports:
      - '3001:3000'
    environment:
      EVENTS_TYPE: 'rabbitmq'
      REDIS_HOST: 'redis'
      REDIS_PORT: 6379
      REDIS_PASSWORD: 'test'
      RABBITMQ_HOST: 'rabbitmq'
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: 'test'
      RABBITMQ_PASSWORD: 'test'
      RABBITMQ_VHOST: ''
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-S', 'http://localhost:3000/health']
      interval: 5s
      timeout: 1s
      retries: 3
  bot1:
    image: ghcr.io/tf2-automatic/bot:latest
    pull_policy: always
    restart: unless-stopped
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      bot-manager:
        condition: service_healthy
      mc:
        condition: service_completed_successfully
    expose:
      - '3000'
    ports:
      - '3000:3000'
    environment:
      DEBUG: true
      # OpenTelemetry (opt-in, off by default). Uncomment to ship logs to the
      # otel-collector above (run with: docker compose --profile observability up).
      # The same OTEL_* vars work on any of the services here. Traces and metrics
      # stay off until you also set OTEL_TRACES_ENABLED / OTEL_METRICS_ENABLED.
      # OTEL_ENABLED: true
      # OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector:4318'
      # Input your bot's credentials here
      STEAM_USERNAME: ''
      STEAM_PASSWORD: ''
      STEAM_API_KEY: ''
      STEAM_SHARED_SECRET: ''
      STEAM_IDENTITY_SECRET: ''
      # RabbitMQ connection details
      EVENTS_TYPE: 'rabbitmq'
      RABBITMQ_HOST: 'rabbitmq'
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: 'test'
      RABBITMQ_PASSWORD: 'test'
      RABBITMQ_VHOST: ''
      # Storage settings
      STORAGE_TYPE: 's3'
      STORAGE_S3_ENDPOINT: 'minio'
      STORAGE_S3_PORT: 9000
      STORAGE_S3_USE_SSL: false
      STORAGE_S3_PATH: '/'
      STORAGE_S3_BUCKET: 'tf2-automatic'
      STORAGE_S3_ACCESS_KEY_ID: 'minioadmin'
      STORAGE_S3_SECRET_ACCESS_KEY: 'minioadmin'
      # Bot manager settings
      BOT_MANAGER_ENABLED: true
      BOT_MANAGER_URL: 'http://bot-manager:3000'
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-S', 'http://localhost:3000/health']
      interval: 5s
      timeout: 1s
      retries: 3
